<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tu Panel de Embajador — PropMatchRD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap" id="contenido">
  <div class="loading"><div class="spinner"></div>Cargando tu panel de embajador…</div>
</div>

<script src="app.js"></script>
<script>
(async function () {
  const codigo = obtenerParametro('codigo') || obtenerParametro('embajador');
  if (!codigo) { mostrarError('contenido', 'Falta tu código de acceso en el enlace.'); return; }

  try {
    const datos = await llamarApi({ embajador: codigo });
    if (datos.error) { mostrarError('contenido', datos.mensaje); return; }
    pintarPanel(datos);
  } catch (err) {
    mostrarError('contenido', 'Ocurrió un problema de conexión. Intenta de nuevo en unos minutos.');
  }
})();

function pintarPanel(datos) {
  const pasosHtml = datos.pasos.map((p) => {
    const icono = p.hecho ? '✓' : '○';
    const clase = p.hecho ? 'hecho' : '';
    return '<div class="ruta-paso ' + clase + '"><div class="ruta-nodo">' + icono + '</div><div class="ruta-texto">' + p.titulo + '</div></div>';
  }).join('');

  document.getElementById('contenido').innerHTML =
    '<div style="text-align:center"><span class="badge gold" style="background:#b8860b">Nivel ' + datos.nivel + '</span></div>' +
    '<h1 style="text-align:center">Hola ' + datos.nombre + '</h1>' +
    '<p style="text-align:center;font-family:var(--font-mono);color:var(--text-muted)">Tu código: ' + datos.codigoReferido + '</p>' +

    '<div class="card" style="text-align:center"><h3>Tu nivel de desempeño</h3>' +
    construirGraficoGauge(datos.score, '#b8860b', 110) +
    '<p style="font-size:12px;color:var(--text-muted);margin-top:6px">Se calcula con tu tasa de conversión, validación y actividad reciente — no es un premio por antigüedad, sino por resultados.</p></div>' +

    '<div class="stat-grid">' +
    '<div class="stat"><span class="num">' + datos.kpis.totalReferidos + '</span><span class="label">Referidos totales</span></div>' +
    '<div class="stat"><span class="num">' + datos.kpis.validados + '</span><span class="label">Validados</span></div>' +
    '<div class="stat"><span class="num">' + datos.kpis.cerrados + '</span><span class="label">Compras completadas</span></div>' +
    '<div class="stat"><span class="num">' + formatoRD(datos.kpis.comisionAcumulada) + '</span><span class="label">Comisión cobrada</span></div>' +
    '</div>' +

    (datos.kpis.comisionReservadaMax > 0
      ? '<div class="alert info">Tienes entre ' + formatoRD(datos.kpis.comisionReservadaMin) + ' y ' + formatoRD(datos.kpis.comisionReservadaMax) + ' en comisión <b>reservada</b> — de referidos que ya están en proceso pero aún no han comprado.</div>'
      : '') +

    '<div class="card"><h3>Tu embudo de referidos</h3>' +
    construirGraficoBarras([
      { etiqueta: 'Referidos totales', valor: datos.kpis.totalReferidos, color: '#0f7a6b' },
      { etiqueta: 'Validados', valor: datos.kpis.validados, color: '#1a73e8' },
      { etiqueta: 'Compras completadas', valor: datos.kpis.cerrados, color: '#e4572e' }
    ]) + '</div>' +

    (datos.referidos && datos.referidos.length
      ? '<div class="card"><h3>Tus referidos</h3>' +
        '<p style="font-size:12px;color:var(--text-muted)">Por privacidad, no mostramos teléfono, correo ni presupuesto de tus referidos.</p>' +
        '<table><tr style="font-weight:700"><td>Nombre</td><td>Tipo</td><td>Estado</td><td>Fecha</td></tr>' +
        datos.referidos.map(r => '<tr><td>' + r.nombre + '</td><td>' + r.tipo + '</td><td>' + r.estado + '</td><td>' + new Date(r.fecha).toLocaleDateString('es-DO') + '</td></tr>').join('') +
        '</table></div>'
      : '') +

    '<div class="card"><h3>Cómo se calcula tu comisión</h3>' +
    '<p style="font-size:13px">Tu comisión sale de un fondo <b>separado</b> del que gana la plataforma con el agente — ' +
    'nunca le quita nada al agente. El fondo es el ' + datos.comision.pctBasePool + '% del monto de venta, y tú ganas el ' +
    '<b>' + datos.comision.pctEmbajadorEfectivo + '%</b> de ese fondo' +
    (datos.comision.calificaParaBono
      ? ' — ya incluye tu bono por buen desempeño (+' + datos.comision.pctBonoAltoDesempeno + '% por tener un nivel de ' + datos.comision.scoreMinimoBono + ' o más).</p>'
      : '. Si tu nivel llega a ' + datos.comision.scoreMinimoBono + ' o más, ganas un bono adicional de +' + datos.comision.pctBonoAltoDesempeno + '% (hoy tienes ' + datos.score + ').</p>') +

    '<h4 style="margin-bottom:6px">Calcula tu comisión estimada</h4>' +
    '<div class="code-input"><input type="text" id="inputMontoVenta" value="5000000" inputmode="numeric">' +
    '<button class="btn btn-primary btn-sm" onclick="calcularComisionEstimada()">Calcular</button></div>' +
    '<p id="resultadoCalculadora" style="font-size:15px;margin-top:10px;font-weight:600"></p></div>' +

    (datos.mensajePersonalizado
      ? '<div class="card"><h3>Tu mensaje sugerido</h3>' +
        '<p style="font-size:13px">Un mensaje ya redactado para el canal que elegiste — cópialo y compártelo cuando quieras.</p>' +
        '<p id="mensajeIA" style="background:#fff8e6;padding:12px;border-radius:6px;font-style:italic">' + datos.mensajePersonalizado + '</p>' +
        '<button class="btn btn-outline btn-sm" onclick="copiarMensaje()">Copiar mensaje</button> ' +
        '<button class="btn btn-outline btn-sm" onclick="regenerarMensaje()" id="btnRegenerar">Generar otro</button>' +
        '<p id="copiadoOk" style="font-size:13px;margin-top:6px"></p></div>'
      : '') +

    '<div class="card"><h3>Tu progreso</h3><div class="ruta">' + pasosHtml + '</div></div>' +

    '<p class="footer-note">Comparte tu enlace personal para seguir generando referidos.</p>';

  window.DATOS_COMISION_ACTUAL = datos.comision;
}

function calcularComisionEstimada() {
  const monto = Number(document.getElementById('inputMontoVenta').value.replace(/[^0-9]/g, '')) || 0;
  const c = window.DATOS_COMISION_ACTUAL;
  if (!c || monto <= 0) {
    document.getElementById('resultadoCalculadora').textContent = 'Ingresa un monto válido.';
    return;
  }
  const pool = monto * (c.pctBasePool / 100);
  const ganancia = pool * (c.pctEmbajadorEfectivo / 100);
  document.getElementById('resultadoCalculadora').innerHTML =
    'Con una venta de ' + formatoRD(monto) + ', ganarías aproximadamente <span style="color:#b8860b">' + formatoRD(Math.round(ganancia)) + '</span>.';
}

async function copiarMensaje() {
  const texto = document.getElementById('mensajeIA').textContent;
  try {
    await navigator.clipboard.writeText(texto);
    document.getElementById('copiadoOk').textContent = '¡Copiado!';
  } catch (e) {
    document.getElementById('copiadoOk').textContent = 'No se pudo copiar automáticamente — selecciona el texto manualmente.';
  }
}

async function regenerarMensaje() {
  const codigo = obtenerParametro('codigo') || obtenerParametro('embajador');
  const boton = document.getElementById('btnRegenerar');
  boton.disabled = true;
  boton.textContent = 'Generando…';
  try {
    const datos = await ejecutarAccion({ embajador: codigo, accion: 'regenerarMensaje' });
    if (datos.error) {
      document.getElementById('copiadoOk').textContent = '⚠️ ' + datos.mensaje;
      boton.disabled = false;
      boton.textContent = 'Generar otro';
      return;
    }
    pintarPanel(datos);
  } catch (e) {
    document.getElementById('copiadoOk').textContent = 'No se pudo generar un mensaje nuevo. Intenta de nuevo.';
    boton.disabled = false;
    boton.textContent = 'Generar otro';
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tu panel — PropMatchRD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap" id="contenido">
  <div class="loading"><div class="spinner"></div>Espera un momento, estamos cargando tu panel…</div>
</div>

<script src="app.js"></script>
<script>
  let CODIGO_PANEL = '';

  async function cargarPanel(idContacto) {
    const params = { panel: CODIGO_PANEL };
    if (idContacto) params.contacto = idContacto;
    const datos = await llamarApi(params);
    if (datos.error) { mostrarError('contenido', datos.mensaje); return; }
    guardarCodigoRecordado('agente', CODIGO_PANEL); // automatización: la próxima vez, index.html ya lo recuerda

    const filas = datos.compradores.map(c =>
      '<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
      '<b style="font-size:15px">' + c.nombre + '</b>' +
      '<span style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono)">' + c.id + '</span>' +
      '</div>' +
      '<div style="font-size:13px;margin-bottom:6px"><b>' + c.iicdScore + '/100</b> ' + c.iicdEtiqueta + ' · ' + c.etapaRutaCompra + ' · ' + c.ipcEtiqueta + '</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">' +
      (c.contactoPendiente
        ? '<button class="btn btn-primary btn-sm" onclick="cargarPanel(\'' + c.id + '\')">Marcar contacto</button>'
        : '<span style="font-size:13px">✅ Contactado</span>') +
      '<button class="btn btn-outline btn-sm" onclick="abrirAccionRapida(\'visita\',\'' + c.id + '\',\'' + c.nombre.replace(/'/g, "\\'") + '\')">📝 Visita</button>' +
      '<button class="btn btn-outline btn-sm" onclick="abrirAccionRapida(\'cierreVenta\',\'' + c.id + '\',\'' + c.nombre.replace(/'/g, "\\'") + '\')">✅ Cerrar</button>' +
      '</div></div>'
    ).join('');

    const disponible = datos.disponibilidad !== 'No';
    const atiendeAlquileres = datos.atiendeAlquileres === 'Sí';

    document.getElementById('contenido').innerHTML =
      (datos.mensajeContacto ? datos.mensajeContacto : '') +
      '<div style="text-align:center"><span class="badge">' + datos.nivel + '</span></div>' +
      '<h1 style="text-align:center">Hola ' + datos.nombre + '</h1>' +

      '<div class="stat-grid">' +
      '<div class="stat"><span class="num">' + datos.kpis.compradoresActivos + '</span><span class="label">Compradores activos</span></div>' +
      '<div class="stat"><span class="num">' + datos.kpis.cierresConfirmados + '</span><span class="label">Cierres confirmados</span></div>' +
      '<div class="stat"><span class="num">' + datos.kpis.tasaConversionPct + '/100</span><span class="label">Tasa conversión</span></div>' +
      '<div class="stat"><span class="num">' + (datos.kpis.tiempoRespuestaHoras || '—') + '</span><span class="label">Horas resp.</span></div>' +
      '</div>' +

      '<div class="card" style="text-align:center"><h3>Tu tasa de conversión</h3>' +
      construirGraficoGauge(datos.kpis.tasaConversionPct, '#0f7a6b', 110) + '</div>' +

      (datos.comisionesPendientes
        ? '<div class="alert">⚠️ Tienes ' + datos.comisionesPendientes + ' comisión(es) pendiente(s) de pago. Revisa tu correo.</div>'
        : '') +

      (datos.compradoresCompitiendo && datos.compradoresCompitiendo.length
        ? '<div class="card"><h3>⚡ En competencia</h3>' +
          '<p style="font-size:13px">Estos compradores fueron distribuidos a varios agentes al mismo tiempo, incluido tú. ' +
          'El primero en registrar una visita real se queda con la exclusividad.</p>' +
          datos.compradoresCompitiendo.map(c =>
            '<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
            '<b style="font-size:15px">' + c.nombre + '</b>' +
            '<span style="font-size:12px;background:var(--sand-deep);padding:2px 10px;border-radius:100px">' + c.clasificacion + '</span>' +
            '</div>' +
            '<button class="btn btn-primary btn-sm" onclick="abrirAccionRapida(\'visita\',\'' + c.id + '\',\'' + c.nombre.replace(/'/g, "\\'") + '\')">📝 Ganar con visita</button>' +
            '</div>'
          ).join('') +
          '</div>'
        : '') +

      '<div class="card"><h3>Tus compradores activos</h3>' +
      (datos.compradores.length ? filas : '<p>No tienes compradores activos en este momento.</p>') +
      '</div>' +

      '<div class="card" id="cardAccionRapida" style="display:none;border:2px solid #1a73e8"></div>' +

      (datos.alquileresCompitiendo && datos.alquileresCompitiendo.length
        ? '<div class="card"><h3>⚡ Alquileres en competencia</h3>' +
          '<p style="font-size:13px">Estas solicitudes fueron distribuidas a varios agentes al mismo tiempo, incluido tú. ' +
          'El primero en reportar el cierre se queda con la comisión.</p>' +
          datos.alquileresCompitiendo.map(a =>
            '<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
            '<b style="font-size:15px">' + a.nombre + '</b>' +
            '<span style="font-size:12px;background:var(--sand-deep);padding:2px 10px;border-radius:100px">' + a.clasificacion + '</span>' +
            '</div>' +
            '<button class="btn btn-primary btn-sm" onclick="abrirAccionRapida(\'cierreAlquiler\',\'' + a.id + '\',\'' + a.nombre.replace(/'/g, "\\'") + '\')">✅ Ganar con cierre</button>' +
            '</div>'
          ).join('') +
          '</div>'
        : '') +

      '<div class="card"><h3>🔑 Tus alquileres asignados</h3>' +
      (datos.alquileresActivos && datos.alquileresActivos.length
        ? datos.alquileresActivos.map(a =>
            '<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
            '<b style="font-size:15px">' + a.nombre + '</b>' +
            '<span style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono)">' + a.id + '</span>' +
            '</div>' +
            '<div style="font-size:13px;margin-bottom:8px">' + a.zona + ' · ' + a.presupuesto + ' · ' + a.clasificacion + '</div>' +
            '<button class="btn btn-outline btn-sm" onclick="abrirAccionRapida(\'cierreAlquiler\',\'' + a.id + '\',\'' + a.nombre.replace(/'/g, "\\'") + '\')">✅ Cerrar</button>' +
            '</div>'
          ).join('')
        : '<p>No tienes alquileres asignados en este momento.</p>') +
      '</div>' +

      '<div class="card"><h3>⚙️ Mi disponibilidad</h3>' +
      '<p style="font-size:13px">Desactívala si no puedes recibir compradores nuevos ahora (vacaciones, sobrecarga, etc.) — se reactiva cuando quieras, sin depender del admin.</p>' +
      '<button class="btn ' + (disponible ? 'btn-primary' : 'btn-outline') + '" onclick="cambiarDisponibilidad(\'Sí\')">✅ Disponible</button> ' +
      '<button class="btn ' + (!disponible ? 'btn-coral' : 'btn-outline') + '" onclick="cambiarDisponibilidad(\'No\')">⏸️ No disponible</button>' +
      '</div>' +

      '<div class="card"><h3>🔑 Atención de alquileres</h3>' +
      '<p style="font-size:13px">Si la activas, también recibirás solicitudes de personas buscando alquilar, no solo comprar. Se detectó automáticamente de tu especialidad, pero puedes ajustarlo aquí cuando quieras.</p>' +
      '<button class="btn ' + (atiendeAlquileres ? 'btn-primary' : 'btn-outline') + '" onclick="cambiarAtiendeAlquileres(\'Sí\')">✅ Sí, atiendo alquileres</button> ' +
      '<button class="btn ' + (!atiendeAlquileres ? 'btn-coral' : 'btn-outline') + '" onclick="cambiarAtiendeAlquileres(\'No\')">No por ahora</button>' +
      '</div>' +

      '<div class="card"><h3>⚙️ Mi información</h3>' +
      '<label style="font-size:13px">Teléfono</label>' +
      '<div class="code-input"><input type="text" id="inputTelefonoAgente" value="' + datos.telefono + '">' +
      '<button class="btn btn-outline btn-sm" onclick="guardarCampoAgente(\'actualizarTelefono\',\'inputTelefonoAgente\')">Guardar</button></div>' +
      '<label style="font-size:13px;margin-top:10px;display:block">Correo</label>' +
      '<div class="code-input"><input type="text" id="inputEmailAgente" value="' + datos.email + '">' +
      '<button class="btn btn-outline btn-sm" onclick="guardarCampoAgente(\'actualizarEmail\',\'inputEmailAgente\')">Guardar</button></div>' +
      '<p id="mensajeGuardadoAgente" style="font-size:13px;margin-top:8px"></p></div>';
  }

  async function cambiarDisponibilidad(valor) {
    await ejecutarAccion({ panel: CODIGO_PANEL, accion: 'toggleDisponibilidad', valor: valor });
    cargarPanel();
  }

  async function cambiarAtiendeAlquileres(valor) {
    await ejecutarAccion({ panel: CODIGO_PANEL, accion: 'toggleAtiendeAlquileres', valor: valor });
    cargarPanel();
  }

  // ============================================================
  //  ACCIONES RÁPIDAS: registrar visita o cierre sin salir del Panel,
  //  sin escribir ningún ID a mano — ya lo trae el botón que se apretó.
  // ============================================================
  function abrirAccionRapida(tipo, id, nombre) {
    const cont = document.getElementById('cardAccionRapida');
    cont.style.display = 'block';

    if (tipo === 'visita') {
      cont.innerHTML =
        '<h3>📝 Registrar visita — ' + nombre + '</h3>' +
        '<label style="font-size:13px">¿Qué pasó en la visita?</label>' +
        '<select id="raQuePaso" class="btn btn-outline" style="width:100%;margin-bottom:8px">' +
        '<option value="Le gustó - quiere reservar">Le gustó - quiere reservar</option>' +
        '<option value="No le gustó - seguir buscando">No le gustó - seguir buscando</option>' +
        '<option value="Reservó en el momento">Reservó en el momento</option>' +
        '<option value="Comprador no asistió">Comprador no asistió</option>' +
        '<option value="Tuve que cancelar/reprogramar">Tuve que cancelar/reprogramar</option>' +
        '</select>' +
        '<label style="font-size:13px">Si no le gustó, ¿por qué? (opcional)</label>' +
        '<input type="text" id="raMotivo" style="width:100%;margin-bottom:8px">' +
        '<label style="font-size:13px">¿Qué tan compatible fue (1-5)?</label>' +
        '<input type="number" id="raCompatibilidad" min="1" max="5" style="width:100%;margin-bottom:8px">' +
        '<label style="font-size:13px">¿Próximo paso?</label>' +
        '<select id="raProximoPaso" class="btn btn-outline" style="width:100%;margin-bottom:10px">' +
        '<option value="Agendar otra visita">Agendar otra visita</option>' +
        '<option value="Esperar respuesta">Esperar respuesta</option>' +
        '<option value="Comprador perdido - no seguir">Comprador perdido - no seguir</option>' +
        '</select>' +
        '<button class="btn btn-primary" onclick="enviarAccionRapida(\'visita\',\'' + id + '\')">Registrar visita</button> ' +
        '<button class="btn btn-outline" onclick="cerrarAccionRapida()">Cancelar</button>' +
        '<p id="raMensaje" style="font-size:13px;margin-top:8px"></p>';
    } else if (tipo === 'cierreVenta' || tipo === 'cierreAlquiler') {
      const esAlquiler = tipo === 'cierreAlquiler';
      cont.innerHTML =
        '<h3>✅ Registrar cierre de ' + (esAlquiler ? 'alquiler' : 'venta') + ' — ' + nombre + '</h3>' +
        '<label style="font-size:13px">Monto ' + (esAlquiler ? 'de alquiler mensual' : 'final de venta') + ' (RD$)</label>' +
        '<input type="number" id="raMonto" style="width:100%;margin-bottom:8px">' +
        (esAlquiler
          ? '<label style="font-size:13px">Duración del contrato (meses)</label><input type="number" id="raMeses" value="12" style="width:100%;margin-bottom:8px">'
          : '') +
        '<label style="font-size:13px">Enlace a evidencia (contrato/factura) — obligatorio</label>' +
        '<input type="text" id="raEvidencia" style="width:100%;margin-bottom:8px">' +
        '<label style="font-size:13px">¿El monto final fue distinto al esperado? (opcional)</label>' +
        '<input type="text" id="raNota" style="width:100%;margin-bottom:10px">' +
        '<button class="btn btn-primary" onclick="enviarAccionRapida(\'' + tipo + '\',\'' + id + '\')">Registrar cierre</button> ' +
        '<button class="btn btn-outline" onclick="cerrarAccionRapida()">Cancelar</button>' +
        '<p id="raMensaje" style="font-size:13px;margin-top:8px"></p>';
    }
    cont.scrollIntoView({ behavior: 'smooth' });
  }

  function cerrarAccionRapida() {
    document.getElementById('cardAccionRapida').style.display = 'none';
  }

  async function enviarAccionRapida(tipo, id) {
    const msj = document.getElementById('raMensaje');
    msj.textContent = 'Enviando…';
    let params = { panel: CODIGO_PANEL };

    if (tipo === 'visita') {
      params.accion = 'registrarVisitaAgente';
      params.idComprador = id;
      params.quePaso = document.getElementById('raQuePaso').value;
      params.motivoRechazo = document.getElementById('raMotivo').value;
      params.compatibilidad = document.getElementById('raCompatibilidad').value;
      params.proximoPaso = document.getElementById('raProximoPaso').value;
    } else if (tipo === 'cierreVenta') {
      params.accion = 'registrarCierreVentaAgente';
      params.idComprador = id;
      params.montoVenta = document.getElementById('raMonto').value;
      params.evidenciaUrl = document.getElementById('raEvidencia').value;
      params.nota = document.getElementById('raNota').value;
    } else if (tipo === 'cierreAlquiler') {
      params.accion = 'registrarCierreAlquilerAgente';
      params.idSolicitud = id;
      params.montoMensual = document.getElementById('raMonto').value;
      params.mesesContrato = document.getElementById('raMeses').value;
      params.evidenciaUrl = document.getElementById('raEvidencia').value;
      params.nota = document.getElementById('raNota').value;
    }

    if ((tipo === 'cierreVenta' || tipo === 'cierreAlquiler') && !params.evidenciaUrl) {
      msj.textContent = '⚠️ La evidencia es obligatoria.';
      return;
    }

    try {
      const resultado = await ejecutarAccion(params);
      if (resultado.error) { msj.textContent = '⚠️ ' + resultado.mensaje; return; }
      msj.textContent = '✅ ' + (resultado.mensaje || 'Registrado correctamente.');
      setTimeout(() => cargarPanel(), 1200);
    } catch (e) {
      msj.textContent = '⚠️ Ocurrió un problema de conexión. Intenta de nuevo.';
    }
  }

  async function guardarCampoAgente(accion, inputId) {
    const valor = document.getElementById(inputId).value.trim();
    if (!valor) return;
    const msj = document.getElementById('mensajeGuardadoAgente');
    msj.textContent = 'Guardando…';
    try {
      const resultado = await ejecutarAccion({ panel: CODIGO_PANEL, accion: accion, valor: valor });
      msj.textContent = resultado.error ? '⚠️ ' + resultado.mensaje : '✅ Guardado.';
    } catch (e) {
      msj.textContent = '⚠️ No se pudo guardar. Intenta de nuevo.';
    }
  }

  (async function () {
    CODIGO_PANEL = obtenerParametro('codigo') || obtenerParametro('panel');
    if (!CODIGO_PANEL) { mostrarError('contenido', 'Falta tu código de acceso en el enlace.'); return; }
    try {
      await cargarPanel();
    } catch (err) {
      mostrarError('contenido', 'Ocurrió un problema de conexión. Intenta de nuevo en unos minutos.');
    }
  })();
</script>
</body>
</html>

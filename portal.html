<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tu análisis — PropMatchRD</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap" id="contenido">
  <div class="loading"><div class="spinner"></div>Espera un momento, estamos cargando tu análisis…</div>
</div>

<script src="app.js"></script>
<script>
(async function () {
  const codigo = obtenerParametro('codigo') || obtenerParametro('portal');
  if (!codigo) { mostrarError('contenido', 'Falta tu código de acceso en el enlace.'); return; }

  try {
    const datos = await llamarApi({ portal: codigo });
    if (datos.error) { mostrarError('contenido', datos.mensaje); return; }
    guardarCodigoRecordado('comprador', codigo); // automatización: la próxima vez, index.html ya lo recuerda

    const g = datos.gastos || {};
    const documentos = datos.documentos || {};
    document.getElementById('contenido').innerHTML =
      '<div style="text-align:center">' + construirBadgeClasificacion(datos.clasificacion) + '</div>' +
      '<h1>Hola ' + datos.nombre + '</h1>' +

      '<div class="alert info"><b>Estado:</b> ' + datos.estadoExplicado + '</div>' +

      '<div class="card"><p style="font-size:16px;color:var(--ink);margin:0">' + datos.analisisPersonalizado + '</p></div>' +

      '<div class="card" style="text-align:center">' +
      '<div style="display:flex;justify-content:center;gap:24px;flex-wrap:wrap">' +
      '<div>' + construirGraficoGauge(datos.indicePreparacionPct, '#0f7a6b', 110) + '<div style="font-size:12px;color:var(--text-muted);margin-top:6px">Índice de Preparación<br>' + datos.indicePreparacionPct + '/100</div></div>' +
      '<div>' + construirGraficoGauge(datos.probabilidadFinanciamientoPct, '#e4572e', 110) + '<div style="font-size:12px;color:var(--text-muted);margin-top:6px">Probabilidad de Financiamiento<br>' + datos.probabilidadFinanciamientoPct + '/100</div></div>' +
      '</div></div>' +

      '<div class="card"><h3>Tu Ruta de Compra</h3><div class="ruta">' +
      construirRutaHtml(datos.etapaRutaCompra, datos.etapasRutaCompra) + '</div></div>' +

      '<div class="card"><h3>💰 Gastos a considerar (más allá del precio)</h3><table>' +
      '<tr><td>Inicial (aprox.)</td><td class="num">' + formatoRD(g.inicial) + '</td></tr>' +
      '<tr><td>Transferencia</td><td class="num">' + formatoRD(g.transferencia) + '</td></tr>' +
      '<tr><td>Seguro (mensual)</td><td class="num">' + formatoRD(g.seguroMin) + ' - ' + formatoRD(g.seguroMax) + '</td></tr>' +
      '<tr><td>Tasación</td><td class="num">' + formatoRD(g.tasacionMin) + ' - ' + formatoRD(g.tasacionMax) + '</td></tr>' +
      '<tr><td>Gastos de cierre</td><td class="num">' + formatoRD(g.cierreMin) + ' - ' + formatoRD(g.cierreMax) + '</td></tr>' +
      '<tr><td>IPI (anual)</td><td class="num">' + (g.aplicaIPI ? formatoRD(g.ipiAnual) : 'No aplica') + '</td></tr>' +
      '<tr><td style="font-weight:700">Total estimado para iniciar</td><td class="num" style="font-weight:700">' + formatoRD(g.totalMin) + ' - ' + formatoRD(g.totalMax) + '</td></tr>' +
      '</table><p style="font-size:11px;margin-top:8px">Estimados de referencia — confirma cifras con tu banco y abogado.</p></div>' +

      (datos.faltantes.length
        ? '<div class="card"><h3>¿Qué sigue?</h3><ul>' + datos.faltantes.map(f => '<li>' + f + '</li>').join('') + '</ul></div>'
        : '<div class="alert success">Tu perfil está completo — tu agente te contactará pronto.</div>') +

      (datos.alertaPresupuesto ? '<div class="alert">' + datos.alertaPresupuesto + '</div>' : '') +

      (datos.certificadoUrl ? '<p style="text-align:center"><a class="btn btn-primary" href="' + datos.certificadoUrl + '">📄 Ver mi Certificado</a></p>' : '') +

      '<div class="card"><h3>📄 Centro de Documentos</h3>' +
      '<p style="font-size:13px">Marca lo que ya tienes listo — tu agente lo verá automáticamente.</p>' +
      construirFilaDocumento('cedula', 'Doc_Cedula', 'Cédula', documentos.cedula) +
      construirFilaDocumento('cartaTrabajo', 'Doc_Carta_Trabajo', 'Carta de trabajo', documentos.cartaTrabajo) +
      construirFilaDocumento('estadosCuenta', 'Doc_Estados_Cuenta', 'Estados de cuenta', documentos.estadosCuenta) +
      '</div>' +

      (datos.calificacionVisitaPendiente ? construirMiniEncuestaVisita() : '') +

      '<div class="card"><h3>🆘 ¿Necesitas algo?</h3>' +
      '<p style="font-size:13px">Un clic y avisamos a tu agente — sin necesidad de llamar.</p>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
      construirBotonAyuda('Tengo dudas') + construirBotonAyuda('Quiero cambiar de zona') +
      construirBotonAyuda('Quiero cambiar de agente') + construirBotonAyuda('Quiero reagendar') +
      '</div><p id="mensajeAyuda" style="font-size:13px;margin-top:8px"></p></div>' +

      '<div class="card"><h3>💡 Mientras esperas</h3>' +
      '<ul style="font-size:14px">' +
      '<li>5 errores comunes al comprar tu primera propiedad: no verificar el título, no calcular todos los gastos de cierre, negociar sin preaprobación, saltarse la tasación, y firmar sin un abogado independiente.</li>' +
      '<li>Documentos que casi siempre te van a pedir: cédula, carta de trabajo o estados de cuenta, y comprobante de la inicial.</li>' +
      '<li>Mejorar tus posibilidades de aprobación: mantén tus estados de cuenta organizados, evita nuevas deudas mientras tramitas, y ten tu inicial disponible y documentada.</li>' +
      '</ul></div>' +

      '<div class="card"><h3>⚙️ Mi información</h3>' +
      '<p style="font-size:13px">Actualiza tus datos de contacto si cambiaron.</p>' +
      '<label style="font-size:13px">Teléfono</label>' +
      '<div class="code-input"><input type="text" id="inputTelefono" value="' + datos.telefono + '">' +
      '<button class="btn btn-outline btn-sm" onclick="guardarCampo(\'actualizarTelefono\',\'inputTelefono\')">Guardar</button></div>' +
      '<label style="font-size:13px;margin-top:10px;display:block">Correo</label>' +
      '<div class="code-input"><input type="text" id="inputEmail" value="' + datos.email + '">' +
      '<button class="btn btn-outline btn-sm" onclick="guardarCampo(\'actualizarEmail\',\'inputEmail\')">Guardar</button></div>' +
      '<p id="mensajeGuardado" style="font-size:13px;margin-top:8px"></p></div>' +

      '<p class="footer-note">Código: ' + datos.idComprador + '</p>';

    window.CODIGO_PORTAL_ACTUAL = codigo;
  } catch (err) {
    mostrarError('contenido', 'Ocurrió un problema de conexión. Intenta de nuevo en unos minutos.');
  }
})();

function construirFilaDocumento(idSufijo, campo, etiqueta, marcado) {
  return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)">' +
    '<input type="checkbox" id="doc_' + idSufijo + '" ' + (marcado ? 'checked' : '') +
    ' onchange="actualizarDocumento(\'' + campo + '\', this.checked)" style="width:18px;height:18px">' +
    '<label for="doc_' + idSufijo + '" style="font-size:14px">' + etiqueta + '</label></div>';
}

async function actualizarDocumento(campo, marcado) {
  await ejecutarAccion({ portal: window.CODIGO_PORTAL_ACTUAL, accion: 'actualizarDocumento', campo: campo, valor: marcado ? 'Sí' : 'No' });
}

function construirMiniEncuestaVisita() {
  return '<div class="card" id="cardEncuestaVisita"><h3>⭐ ¿Cómo fue tu última visita?</h3>' +
    '<div id="preguntasVisita">' +
    construirPreguntaVisita('Agente_Puntual', '¿Tu agente llegó puntual?') +
    construirPreguntaVisita('Agente_Explico_Bien', '¿Explicó bien las opciones?') +
    construirPreguntaVisita('Recomendaria_Agente', '¿Lo recomendarías?') +
    '</div></div>';
}

function construirPreguntaVisita(campo, pregunta) {
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)">' +
    '<span style="font-size:14px">' + pregunta + '</span>' +
    '<span><button class="btn btn-primary btn-sm" onclick="calificarVisita(\'' + campo + '\',\'Sí\',this)">Sí</button> ' +
    '<button class="btn btn-outline btn-sm" onclick="calificarVisita(\'' + campo + '\',\'No\',this)">No</button></span></div>';
}

async function calificarVisita(campo, valor, boton) {
  await ejecutarAccion({ portal: window.CODIGO_PORTAL_ACTUAL, accion: 'calificarVisita', campo: campo, valor: valor });
  boton.closest('div').innerHTML = '<span style="font-size:14px">✅ ¡Gracias!</span>';
}

function construirBotonAyuda(tipo) {
  return '<button class="btn btn-outline btn-sm" onclick="solicitarAyuda(\'' + tipo + '\')">' + tipo + '</button>';
}

async function solicitarAyuda(tipo) {
  const msj = document.getElementById('mensajeAyuda');
  msj.textContent = 'Enviando…';
  try {
    await ejecutarAccion({ portal: window.CODIGO_PORTAL_ACTUAL, accion: 'solicitarAyuda', valor: tipo });
    msj.textContent = '✅ Le avisamos a tu agente. Te contactará pronto.';
  } catch (e) {
    msj.textContent = '⚠️ No se pudo enviar. Intenta de nuevo.';
  }
}

async function guardarCampo(accion, inputId) {
  const valor = document.getElementById(inputId).value.trim();
  if (!valor) return;
  const msj = document.getElementById('mensajeGuardado');
  msj.textContent = 'Guardando…';
  try {
    const resultado = await ejecutarAccion({ portal: window.CODIGO_PORTAL_ACTUAL, accion: accion, valor: valor });
    msj.textContent = resultado.error ? '⚠️ ' + resultado.mensaje : '✅ Guardado.';
  } catch (e) {
    msj.textContent = '⚠️ No se pudo guardar. Intenta de nuevo.';
  }
}
</script>
</body>
</html>
